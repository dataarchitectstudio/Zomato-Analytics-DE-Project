###############################################################################
# Zomato Analytics — CI Pipeline
# Triggers on: push to feature branches + PRs targeting main
###############################################################################

name: CI — Code Quality & Validation

on:
  push:
    branches:
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
      - develop

  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  PYTHON_VERSION: "3.11"

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Code Quality (Lint + Format Check + Tests)
  # -----------------------------------------------------------------------
  code-quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Flake8 lint check
        run: |
          flake8 data_generator/ config/ tests/ \
            --max-line-length 120 \
            --extend-ignore=E203,W503,E501 \
            --statistics \
            --count

      - name: Run unit tests
        run: |
          pytest tests/ \
            --cov=data_generator \
            --cov-report=term-missing \
            -v

  # -----------------------------------------------------------------------
  # Job 2: Validate Databricks Notebooks
  # -----------------------------------------------------------------------
  validate-notebooks:
    name: Validate Notebooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate notebook syntax
        run: |
          echo "=== Validating notebook files ==="
          FAILED=0
          for notebook in $(find notebooks -name "*.py" -type f); do
            echo "Checking: $notebook"
            python3 -c "
          import ast, sys
          try:
              with open('$notebook', 'r') as f:
                  lines = f.readlines()
              clean_lines = [l for l in lines if not l.strip().startswith('# MAGIC') and not l.strip().startswith('# COMMAND')]
              code = ''.join(clean_lines)
              ast.parse(code)
              print('  ✓ Syntax OK')
          except SyntaxError as e:
              print(f'  ✗ Syntax error: {e}')
              sys.exit(1)
          " || FAILED=1
          done
          if [ $FAILED -eq 1 ]; then
            echo "✗ Notebook validation failed!"
            exit 1
          fi
          echo "✓ All notebooks validated"

      - name: Scan for hardcoded secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          if grep -rn --include="*.py" -E "(password|secret|api_key|token)\s*=\s*['\"][^'\"]+['\"]" notebooks/ data_generator/ config/; then
            echo "✗ Potential hardcoded secrets found!"
            exit 1
          fi
          echo "✓ No hardcoded secrets detected"

  # -----------------------------------------------------------------------
  # Job 3: CI Status Gate (for branch protection rules)
  # -----------------------------------------------------------------------
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [code-quality, validate-notebooks]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" || \
                "${{ needs.validate-notebooks.result }}" != "success" ]]; then
            echo "✗ CI checks failed!"
            echo "  Code Quality : ${{ needs.code-quality.result }}"
            echo "  Notebooks    : ${{ needs.validate-notebooks.result }}"
            exit 1
          fi
          echo "✓ All CI checks passed — ready for merge"
